<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Área do Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo">
                    <span>&lt;/&gt;</span> CLIENTE<span>AREA</span>
                </div>
                <span class="tag">ADMIN</span>
            </div>
            
            <div class="user-profile">
                <div class="profile-header">
                    <div class="avatar" id="user-avatar">AD</div>
                </div>
                <div class="user-info">
                    <div class="nome" id="user-nome">Administrador</div>
                    <div class="email" id="user-email">admin@empresa.com</div>
                </div>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-item" id="nav-demandas-btn" onclick="mostrarSecao('demandas')">
                    <span class="icone">📋</span>
                    <span id="nav-demandas">Todas as Demandas</span>
                </div>
                <div class="nav-item" id="nav-clientes-btn" onclick="mostrarSecao('clientes')">
                    <span class="icone">👥</span>
                    <span>Clientes</span>
                </div>
                <div class="nav-item" onclick="logout()">
                    <span class="icone">🚪</span>
                    <span>Sair</span>
                </div>
            </nav>
            
            <div class="status-sistema">
                <span class="ponto"></span>
                <span>Sistema Online</span>
            </div>
        </aside>
        
        <button class="menu-toggle" id="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <main class="main-area">
            <header class="header-area">
                <div class="header-title">
                    <h1 id="page-title">Dashboard Admin</h1>
                    <p id="page-subtitle">Gestão completa de clientes</p>
                </div>
            </header>
            
            <div class="filtros" id="filtros-container"></div>
            
            <div class="secao-content" id="secao-demandas">
                <div class="tarefas-grid" id="tarefas-container"></div>
            </div>
            
            <div class="secao-content" id="secao-clientes" style="display: none;">
                <div class="header-clientes">
                    <div class="busca-clientes">
                        <input type="text" id="busca-cliente" placeholder="Buscar cliente..." oninput="renderizarClientes()">
                    </div>
                    <button class="btn btn-primary" onclick="abrirModalNovoCliente()">
                        <span>+</span> Novo Cliente
                    </button>
                </div>
                <div class="clientes-grid" id="clientes-container"></div>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="modal-tarefa">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-titulo">Título</h2>
                <button class="btn-fechar" onclick="fecharModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="info-tarefa">
                    <div class="form-group">
                        <span class="card-id" id="modal-id"></span>
                        <span style="margin-left:15px;opacity:0.5" id="modal-data"></span>
                    </div>
                    <div class="form-group">
                        <label>Descrição</label>
                        <p id="modal-descricao"></p>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="select-status" class="select-status" onchange="alterarStatus(this.value)">
                            <option value="pendente">Pendente</option>
                            <option value="fazendo">Fazendo</option>
                            <option value="revisao">Revisão</option>
                            <option value="concluido">Concluído</option>
                        </select>
                    </div>
                </div>
                <div id="chat-section">
                    <label>Mensagens</label>
                    <div class="chat-mensagens" id="chat-mensagens"></div>
                    <div class="chat-input">
                        <input type="text" id="mensagem-input" placeholder="Mensagem...">
                        <button class="btn btn-primary" onclick="enviarMensagem()">ENVIAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal-novo-cliente">
        <div class="modal">
            <div class="modal-header">
                <h2>Novo Cliente</h2>
                <button class="btn-fechar" onclick="fecharModalNovoCliente()">×</button>
            </div>
            <div class="modal-body">
                <form id="form-novo-cliente">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="novo-cliente-nome" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="novo-cliente-email" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="text" id="novo-cliente-senha" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone/WhatsApp</label>
                        <input type="tel" id="novo-cliente-telefone" placeholder="5511999999999">
                    </div>
                    <div class="form-group">
                        <label>Site</label>
                        <input type="url" id="novo-cliente-site" placeholder="https://www.exemplo.com.br">
                    </div>
                    <button type="submit" class="btn btn-primary" id="btn-cadastrar-cliente">CADASTRAR</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal-editar-cliente">
        <div class="modal">
            <div class="modal-header">
                <h2>Editar Cliente</h2>
                <button class="btn-fechar" onclick="fecharModalEditarCliente()">×</button>
            </div>
            <div class="modal-body">
                <form id="form-editar-cliente">
                    <input type="hidden" id="editar-cliente-id">
                    <div class="form-group">
                        <label>Nome</label>
                        <input type="text" id="editar-cliente-nome" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="editar-cliente-email" disabled>
                    </div>
                    <div class="form-group">
                        <label>Telefone/WhatsApp</label>
                        <input type="tel" id="editar-cliente-telefone" placeholder="5511999999999">
                    </div>
                    <div class="form-group">
                        <label>Site</label>
                        <input type="url" id="editar-cliente-site" placeholder="https://www.exemplo.com.br">
                    </div>
                    <button type="submit" class="btn btn-primary" id="btn-salvar-cliente">SALVAR</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase config
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, updateDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYvLbBw02MbTcCL-CZekBmb5Nv0Cyk5ic",
            authDomain: "cliente-area-crm.firebaseapp.com",
            projectId: "cliente-area-crm",
            storageBucket: "cliente-area-crm.firebasestorage.app",
            messagingSenderId: "584425836546",
            appId: "1:584425836546:web:06ce1d814a750f66a5d71b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let appState = { tarefas: [], clientes: [], filtroStatus: 'todas', filtroCliente: null, unreadMap: {} };
        let tarefaAtual = null;
        let tarefaUnsubscribe = null;
        let toastTimeout = null;
        
function getUnreadCount(tarefa) {
            const msgs = tarefa.mensagens || [];
            if (!msgs.length) return 0;
            const ultima = tarefa.ultimaVisualizacaoAdmin;
            if (!ultima) return msgs.filter(m => m.senderId !== 'admin').length;
            const limiar = new Date(ultima.seconds * 1000);
            return msgs.filter(m => m.senderId !== 'admin' && new Date(m.timestamp) > limiar).length;
        }
        
        function atualizarUnreadMap() {
            appState.tarefas.forEach(t => {
                appState.unreadMap[t.id] = getUnreadCount(t);
            });
            atualizarBadgeTitle();
        }
        
        function tocarSom() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 800;
                gain.gain.value = 0.3;
                osc.start();
                setTimeout(() => { osc.stop(); ctx.close(); }, 200);
            } catch(e) {}
        }
        
        function mostrarToast(msg) {
            let toast = document.getElementById('toast-notificacao');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast-notificacao';
                toast.className = 'toast-notificacao';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.classList.add('ativo');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('ativo'), 3000);
        }
        
        function atualizarBadgeTitle() {
            const total = Object.values(appState.unreadMap).reduce((a, b) => a + b, 0);
            document.title = total > 0 ? `(${total}) Dashboard Admin | Área do Cliente` : 'Painel Admin | Área do Cliente';
        }

        // Inicialização
        onAuthStateChanged(auth, user => {
            if (!user) { window.location.href = 'index.html'; return; }
            appState.usuario = { uid: user.uid, email: user.email, nome: user.email.split('@')[0], avatar: 'AD' };
            document.getElementById('user-nome').textContent = appState.usuario.nome;
            document.getElementById('user-email').textContent = appState.usuario.email;
            document.getElementById('user-avatar').textContent = 'AD';
            carregarTarefas();
            carregarClientes();
            renderizarFiltros();
            
            document.getElementById('mensagem-input')?.addEventListener('keydown', e => {
                if (e.key === 'Enter') enviarMensagem();
            });
        });

        // Funções globais
        window.logout = () => { signOut(auth).then(() => { sessionStorage.clear(); window.location.href = 'index.html'; }); };
        window.toggleMenu = () => {
            document.querySelector('.sidebar').classList.toggle('ativo');
            document.getElementById('overlay-menu')?.classList.toggle('ativo');
            document.getElementById('menu-toggle')?.classList.toggle('aberto');
        };
        
        window.mostrarSecao = function(secao) {
            document.getElementById('secao-demandas').style.display = secao === 'demandas' ? 'block' : 'none';
            document.getElementById('secao-clientes').style.display = secao === 'clientes' ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('ativo'));
            document.getElementById('nav-' + secao + '-btn').classList.add('ativo');
            document.getElementById('page-title').textContent = secao === 'clientes' ? 'Clientes' : 'Dashboard Admin';
            document.getElementById('filtros-container').style.display = secao === 'clientes' ? 'none' : 'flex';
            appState.filtroStatus = 'todas';
            appState.filtroCliente = null;
            renderizarTarefas();
            if (secao === 'clientes') renderizarClientes();
        };

function carregarTarefas() {
            onSnapshot(collection(db, "tarefas"), (snap) => {
                appState.tarefas = [];
                snap.forEach(d => appState.tarefas.push({ id: d.id, ...d.data() }));
                appState.tarefas.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
                atualizarUnreadMap();
                renderizarTarefas();
                renderizarFiltros();
            });
        }
        
        function carregarClientes() {
            onSnapshot(collection(db, "users"), (snap) => {
                appState.clientes = [];
                snap.forEach(d => { if (d.data().role !== 'admin') appState.clientes.push({ uid: d.id, ...d.data() }); });
                renderizarClientes();
            });
        }

        function renderizarFiltros() {
            const c = { todas: appState.tarefas.length, pendente: appState.tarefas.filter(t => t.status === 'pendente').length, fazendo: appState.tarefas.filter(t => t.status === 'fazendo').length, revisao: appState.tarefas.filter(t => t.status === 'revisao').length, concluido: appState.tarefas.filter(t => t.status === 'concluido').length };
            document.getElementById('filtros-container').innerHTML = Object.entries(c).map(([s, n]) => `<button class="filtro-btn ${appState.filtroStatus === s ? 'ativo' : ''}" data-status="${s}" onclick="filtrar('${s}')">${s.charAt(0).toUpperCase() + s.slice(1)} <span class="count">${n}</span></button>`).join('');
        }

        window.filtrar = function(s) {
            appState.filtroStatus = s;
            document.querySelectorAll('.filtro-btn').forEach(b => b.classList.toggle('ativo', b.dataset.status === s));
            renderizarTarefas();
        };

        function renderizarTarefas() {
            atualizarUnreadMap();
            let lista = appState.tarefas.filter(t => appState.filtroStatus === 'todas' || t.status === appState.filtroStatus);
            if (appState.filtroCliente) lista = lista.filter(t => t.clienteId === appState.filtroCliente);
            const html = ['pendente', 'fazendo', 'revisao', 'concluido'].map(st => {
                const ts = lista.filter(t => t.status === st);
                if (!ts.length) return '';
                return `<div class="grupo-status"><div class="grupo-header ${st}"><span class="grupo-titulo">${st.toUpperCase()}</span><span class="grupo-count">${ts.length}</span></div><div class="grupo-cards">${ts.map(t => {
                    const unread = appState.unreadMap[t.id] || 0;
                    const badge = unread > 0 ? `<span class="unread-badge">${unread}</span>` : '';
                    
                    const msgs = t.mensagens || [];
                    let ultimaMsg = '';
                    if (msgs.length > 0) {
                        const ultima = msgs[msgs.length - 1];
                        const texto = ultima.text.length > 50 ? ultima.text.substring(0, 50) + '...' : ultima.text;
                        const quem = ultima.senderId === 'admin' ? '📝 Admin' : '👤 Cliente';
                        let hora = '';
                        try {
                            const dateObj = ultima.timestamp?.seconds ? new Date(ultima.timestamp.seconds * 1000) : new Date(ultima.timestamp);
                            hora = dateObj.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                        } catch(e) {}
                        const classe = ultima.senderId === 'admin' ? 'ultima-msg-admin' : 'ultima-msg-cliente';
                        ultimaMsg = `<div class="ultima-msg ${classe}"><span class="ultima-msg-texto">"${texto}"</span><span class="ultima-msg-info">${quem} • ${hora}</span></div>`;
                    }
                    
                    return `<article class="card-tarefa ${t.status}" onclick="abrirTarefa('${t.id}')"><div class="card-header"><span class="badge-status">${t.status}</span>${badge}<span class="card-id">${t.id.slice(0,8)}</span></div><h3 class="card-titulo">${t.titulo}</h3><p class="card-desc">${t.descricao}</p>${ultimaMsg}<div class="card-footer"><span>${t.clienteNome}</span><span>${new Date(t.updatedAt?.seconds * 1000).toLocaleDateString('pt-BR')}</span></div></article>`;
                }).join('')}</div></div>`;
            }).join('');
            document.getElementById('tarefas-container').innerHTML = html || '<div class="empty-state"><div class="icon">📋</div><h3>Nenhuma demanda</h3></div>';
        }

        function renderizarClientes() {
            const b = document.getElementById('busca-cliente')?.value?.toLowerCase() || '';
            const lista = appState.clientes.filter(c => !b || c.nome?.toLowerCase().includes(b) || c.email?.toLowerCase().includes(b));
            const formatPhone = (tel) => tel ? `<a href="https://wa.me/${tel.replace(/\D/g,'')}" target="_blank" class="cliente-link" title="WhatsApp">📱 ${tel}</a>` : '<span class="cliente-link-empty">Sem WhatsApp</span>';
            const formatSite = (url) => url ? `<a href="${url}" target="_blank" class="cliente-link" title="Acessar site">🌐 ${url.replace(/^https?:\/\//,'')}</a>` : '<span class="cliente-link-empty">Sem site</span>';
            document.getElementById('clientes-container').innerHTML = lista.map(c => `<article class="card-cliente"><div class="cliente-header"><div class="avatar" onclick="appState.filtroCliente = c.uid; mostrarSecao('demandas')">${(c.nome || 'CL').slice(0,2).toUpperCase()}</div><div class="cliente-info"><h3>${c.nome}</h3><p>${c.email}</p><div class="cliente-contatos">${formatPhone(c.telefone)}${formatSite(c.site)}</div></div></div><button class="btn-editar" onclick="editarCliente('${c.uid}')">✏️ Editar</button></article>`).join('') || '<div class="empty-state"><div class="icon">👥</div><h3>Nenhum cliente</h3></div>';
        }

        function marcarComoLido(id) {
            updateDoc(doc(db, "tarefas", id), { ultimaVisualizacaoAdmin: serverTimestamp() });
            delete appState.unreadMap[id];
            atualizarBadgeTitle();
        }
        
        window.abrirTarefa = function(id) {
            tarefaAtual = appState.tarefas.find(t => t.id === id);
            if (!tarefaAtual) return;
            document.getElementById('modal-titulo').textContent = tarefaAtual.titulo;
            document.getElementById('modal-id').textContent = tarefaAtual.id.slice(0,8);
            document.getElementById('modal-descricao').textContent = tarefaAtual.descricao;
            document.getElementById('select-status').value = tarefaAtual.status;
            
            const oldMsgsCount = tarefaAtual.mensagens?.length || 0;
            
            tarefaUnsubscribe = onSnapshot(doc(db, "tarefas", id), doc => {
                const data = doc.data();
                const newMsgsCount = data.mensagens?.length || 0;
                tarefaAtual = { id: doc.id, ...data };
                renderizarMensagens();
                
                if (newMsgsCount > oldMsgsCount) {
                    const novasMsgs = data.mensagens.slice(oldMsgsCount);
                    const temMsgCliente = novasMsgs.some(m => m.senderId !== 'admin');
                    if (temMsgCliente) {
                        tocarSom();
                        mostrarToast('📩 Nova mensagem!');
                    }
                }
            });
            
            renderizarMensagens();
            document.getElementById('modal-tarefa').classList.add('ativo');
        };
        
        window.fecharModal = function() {
            if (tarefaUnsubscribe) {
                tarefaUnsubscribe();
                tarefaUnsubscribe = null;
            }
            if (tarefaAtual) {
                marcarComoLido(tarefaAtual.id);
            }
            document.getElementById('modal-tarefa').classList.remove('ativo');
            tarefaAtual = null;
        };
        
        function renderizarMensagens() {
            const container = document.getElementById('chat-mensagens');
            const msgs = tarefaAtual?.mensagens || [];
            container.innerHTML = msgs.map((m, idx) => {
                const isAdmin = m.senderId === 'admin' || m.senderId === appState.usuario?.uid;
                let hora = '';
                try {
                    const dateObj = m.timestamp?.seconds ? new Date(m.timestamp.seconds * 1000) : new Date(m.timestamp);
                    hora = dateObj.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                } catch(e) {}
                const podeApagar = m.senderId === 'admin' || m.senderId === appState.usuario?.uid;
                const btnApagar = podeApagar ? `<button class="btn-apagar-msg" onclick="apagarMensagem(${idx})" title="Apagar mensagem">×</button>` : '';
                return `<div class="msg ${isAdmin ? 'msg-admin' : 'msg-cliente'}"><div class="msg-content">${btnApagar}<div class="msg-texto">${m.text}</div><div class="msg-info">${isAdmin ? 'Admin' : 'Cliente'} • ${hora}</div></div></div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        };
        
        window.apagarMensagem = async function(idx) {
            if (!tarefaAtual || !confirm('Apagar esta mensagem?')) return;
            const msgs = [...(tarefaAtual.mensagens || [])];
            msgs.splice(idx, 1);
            await updateDoc(doc(db, "tarefas", tarefaAtual.id), { mensagens: msgs, updatedAt: serverTimestamp() });
        };

        window.alterarStatus = async function(s) {
            if (!tarefaAtual) return;
            await updateDoc(doc(db, "tarefas", tarefaAtual.id), { status: s, updatedAt: serverTimestamp() });
        };

        window.enviarMensagem = async function() {
            const txt = document.getElementById('mensagem-input').value.trim();
            if (!txt || !tarefaAtual) return;
            const msgs = tarefaAtual.mensagens || [];
            msgs.push({ senderId: 'admin', text: txt, timestamp: new Date() });
            await updateDoc(doc(db, "tarefas", tarefaAtual.id), { mensagens: msgs, updatedAt: serverTimestamp() });
            document.getElementById('mensagem-input').value = '';
        };

        window.abrirModalNovoCliente = function() {
            document.getElementById('modal-novo-cliente').classList.add('ativo');
        };

        window.fecharModalNovoCliente = function() {
            document.getElementById('modal-novo-cliente').classList.remove('ativo');
            document.getElementById('form-novo-cliente').reset();
        };
        
        window.editarCliente = function(uid) {
            const cliente = appState.clientes.find(c => c.uid === uid);
            if (!cliente) return;
            document.getElementById('editar-cliente-id').value = uid;
            document.getElementById('editar-cliente-nome').value = cliente.nome || '';
            document.getElementById('editar-cliente-email').value = cliente.email || '';
            document.getElementById('editar-cliente-telefone').value = cliente.telefone || '';
            document.getElementById('editar-cliente-site').value = cliente.site || '';
            document.getElementById('modal-editar-cliente').classList.add('ativo');
        };
        
        window.fecharModalEditarCliente = function() {
            document.getElementById('modal-editar-cliente').classList.remove('ativo');
        };
        
        document.getElementById('form-editar-cliente')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const uid = document.getElementById('editar-cliente-id').value;
            const nome = document.getElementById('editar-cliente-nome').value;
            const telefone = document.getElementById('editar-cliente-telefone').value;
            const site = document.getElementById('editar-cliente-site').value;
            const btn = document.getElementById('btn-salvar-cliente');
            btn.disabled = true; btn.textContent = 'Salvando...';
            try {
                await updateDoc(doc(db, "users", uid), { nome, telefone, site, updatedAt: serverTimestamp() });
                alert('Cliente atualizado!');
                fecharModalEditarCliente();
                renderizarClientes();
            } catch(err) {
                alert('Erro: ' + err.message);
            }
            btn.disabled = false; btn.textContent = 'SALVAR';
        });

        document.getElementById('form-novo-cliente')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const nome = document.getElementById('novo-cliente-nome').value;
            const email = document.getElementById('novo-cliente-email').value;
            const senha = document.getElementById('novo-cliente-senha').value;
            const telefone = document.getElementById('novo-cliente-telefone').value;
            const site = document.getElementById('novo-cliente-site').value;
            const btn = document.getElementById('btn-cadastrar-cliente');
            btn.disabled = true; btn.textContent = 'Cadastrando...';
            try {
                const uc = await createUserWithEmailAndPassword(auth, email, senha);
                await setDoc(doc(db, "users", uc.user.uid), { 
                    nome, email, telefone, site, role: 'cliente', status: 'ativo', createdAt: serverTimestamp(), updatedAt: serverTimestamp() 
                });
                alert('Cliente cadastrado!');
                fecharModalNovoCliente();
                renderizarClientes();
            } catch(err) {
                alert('Erro: ' + err.message);
            }
            btn.disabled = false; btn.textContent = 'CADASTRAR';
        });
    </script>
    <div id="toast-notificacao" class="toast-notificacao"></div>
</body>
</html>
